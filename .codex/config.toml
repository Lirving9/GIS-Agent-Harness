approval_policy = "never"
sandbox_mode = "danger-full-access"

[commands]
fixtures = "python3 scripts/generate_sample_data.py"
test = "pytest -q"
tui_test = "pytest -q tests/test_tui_smoke.py"
smoke = "python3 scripts/demo_task.py"
recovery_smoke = "python3 scripts/demo_recovery.py"
readme_smoke = "python3 scripts/demo_readme_workflow.py"
acceptance = "python3 scripts/verify_acceptance.py"
clean = "python3 scripts/clean_local_state.py"
templates = "python3 -m gis_agent_harness.cli templates list"
goal_run = "python3 -m gis_agent_harness.cli goal run --template align_vector_to_raster --vector tests/fixtures/vector/sample_3857.gpkg --raster tests/fixtures/raster/sample.tif --mock"
goal_dry_run = "python3 -m gis_agent_harness.cli goal run --template declare_source_crs --vector tests/fixtures/vector/missing_crs.shp --source-crs EPSG:4326 --dry-run"
config_doctor = "python3 -m gis_agent_harness.cli config doctor"
tui = "python3 -m gis_agent_harness.cli tui"
resume = "python3 -m gis_agent_harness.cli resume-hint"
failure_files = "python3 -m gis_agent_harness.cli show-failure-files"
replay = "python3 -m gis_agent_harness.cli show-replay"
replay_last = "python3 -m gis_agent_harness.cli replay-last --source-crs EPSG:4326 --confirm"
smoke_failures = "python3 scripts/demo_failures.py"
replay_by_id = "python3 -m gis_agent_harness.cli replay-last --run-id RUN_ID --source-crs EPSG:4326 --confirm"
list_failures = "python3 -m gis_agent_harness.cli list-runs --failed-only"
replay_dry_run = "python3 -m gis_agent_harness.cli replay-last --run-id RUN_ID --source-crs EPSG:4326 --dry-run"
list_filtered = "python3 -m gis_agent_harness.cli list-runs --status failed --stage stop --contains geometry"
export_latest_report = "python3 -m gis_agent_harness.cli export-report --latest-failed --print-index"
show_latest_report = "python3 -m gis_agent_harness.cli show-report --latest"
