approval_policy = "never"
sandbox_mode = "danger-full-access"

[commands]
fixtures = "python3 scripts/generate_sample_data.py"
test = "pytest -q"
smoke = "python3 scripts/demo_task.py"
clean = "python3 scripts/clean_local_state.py"
resume = "python3 -m gis_agent_harness.cli resume-hint"
failure_files = "python3 -m gis_agent_harness.cli show-failure-files"
